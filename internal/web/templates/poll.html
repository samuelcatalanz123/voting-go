<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Votaciones 🗳️</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main>
    <h1>🗳️ {{.Question}}</h1>
    <p class="sub">Total de votos: {{.Total}}</p>

    <div class="opciones">
      {{range .Options}}
      <div class="opcion">
        <div class="fila">
          <form method="post" action="/vote/{{$.ID}}" class="votar">
            <input type="hidden" name="option" value="{{.Index}}">
            <button type="submit">Votar</button>
          </form>
          <span class="texto">{{.Text}}</span>
          <span class="pct">{{.Percent}}% ({{.Votes}})</span>
        </div>
        <div class="barra"><div class="relleno" style="width: {{.Percent}}%"></div></div>
      </div>
      {{end}}
    </div>

    <div class="enlace">🔗 Comparte para que voten: <a href="{{.URL}}">{{.URL}}</a></div>
    <a class="nuevo" href="/">+ Crear otra votación</a>
  </main>
</body>
</html>
